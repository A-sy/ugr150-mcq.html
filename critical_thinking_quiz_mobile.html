<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Critical Thinking Quiz – UG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d14;--card:#181824;--border:#272738;
  --accent:#7c6fff;--green:#3ddc84;--red:#ff5c5c;
  --gold:#ffcc44;--text:#eeeeff;--muted:#8080a8;
  --btn-h:52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;line-height:1.5;overflow-x:hidden;}

/* ── LAYOUT ── */
.screen{display:none;min-height:100vh;padding:0 0 32px;}
.screen.active{display:block;}
.inner{max-width:600px;margin:0 auto;padding:0 16px;}

/* ── START ── */
#s-start{background:linear-gradient(160deg,#0d0d14 0%,#12102a 100%);}
.hero{text-align:center;padding:48px 0 32px;}
.badge{display:inline-block;background:rgba(124,111,255,.15);border:1px solid rgba(124,111,255,.4);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:20px;}
.hero h1{font-size:clamp(24px,7vw,36px);font-weight:800;letter-spacing:-0.5px;line-height:1.15;margin-bottom:10px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--muted);font-size:14px;}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:28px 0;}
.info-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 8px;text-align:center;}
.info-val{font-size:22px;font-weight:800;color:var(--accent);display:block;margin-bottom:3px;}
.info-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.btn-start{display:block;width:100%;padding:0;height:var(--btn-h);background:linear-gradient(135deg,#7c6fff,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:transform .15s,box-shadow .15s;}
.btn-start:active{transform:scale(.97);}

/* ── QUIZ ── */
#s-quiz{padding-top:0;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10;}
.topbar-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.q-label{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:.5px;}
.prog-bg{flex:1;height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:10px;transition:width .4s ease;width:0%;}
.score-row{display:flex;gap:8px;margin:14px 16px 0;max-width:600px;margin-left:auto;margin-right:auto;}
.score-chip{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;font-size:11px;color:var(--muted);}
.score-chip strong{display:block;font-size:17px;font-weight:800;color:var(--text);}
.score-chip.g strong{color:var(--green);}
.score-chip.r strong{color:var(--red);}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:18px;margin:14px 16px 0;padding:22px 18px 20px;animation:pop .3s ease;}
@keyframes pop{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.qnum{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.qtext{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:#13131e;border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;font-size:14px;line-height:1.5;transition:border-color .15s,background .15s;-webkit-user-select:none;user-select:none;}
.opt:active:not(.dis){background:rgba(124,111,255,.1);}
.opt-l{width:28px;height:28px;min-width:28px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);transition:all .2s;margin-top:1px;}
.opt.sel-c{border-color:var(--green);background:rgba(61,220,132,.07);}
.opt.sel-c .opt-l{background:var(--green);color:#000;}
.opt.sel-w{border-color:var(--red);background:rgba(255,92,92,.07);}
.opt.sel-w .opt-l{background:var(--red);color:#fff;}
.opt.show-c{border-color:var(--green);background:rgba(61,220,132,.05);}
.opt.show-c .opt-l{background:var(--green);color:#000;}
.opt.dis{cursor:default;}
.feedback{margin-top:14px;padding:12px 14px;border-radius:11px;font-size:13.5px;line-height:1.5;}
.fb-ok{background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);color:#6effa0;}
.fb-no{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.3);color:#ff9090;}
.navrow{display:flex;gap:10px;margin:14px 16px 0;max-width:600px;margin-left:auto;margin-right:auto;}
.btn-nav{flex:1;height:var(--btn-h);border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:transform .1s,opacity .15s;}
.btn-nav:active{transform:scale(.96);}
.btn-nav:disabled{opacity:.35;cursor:default;}
.btn-prev{background:var(--card);color:var(--text);border:1.5px solid var(--border);}
.btn-next{background:var(--accent);color:#fff;}

/* ── RESULTS ── */
#s-results{padding-top:0;}
.res-hero{background:linear-gradient(160deg,#181824,#12102a);border-bottom:1px solid var(--border);padding:40px 16px 32px;text-align:center;}
.res-emoji{font-size:52px;display:block;margin-bottom:12px;}
.res-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.res-pct{font-size:60px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:12px 0 4px;}
.res-sub{color:var(--muted);font-size:14px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 0;}
.res-box{background:#13131e;border:1px solid var(--border);border-radius:13px;padding:16px 8px;text-align:center;}
.res-val{font-size:24px;font-weight:800;display:block;margin-bottom:3px;}
.res-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.rv-section{padding:20px 16px 0;max-width:600px;margin:0 auto;}
.rv-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.rv-item{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:9px;display:flex;gap:12px;}
.rv-dot{width:9px;height:9px;min-width:9px;border-radius:50%;margin-top:5px;}
.rv-dot.ok{background:var(--green);}
.rv-dot.no{background:var(--red);}
.rv-q{font-size:13px;line-height:1.55;margin-bottom:4px;}
.rv-a{font-size:12px;color:var(--muted);}
.rv-a .ok{color:var(--green);}
.rv-a .no{color:var(--red);}
.retry-row{padding:16px;max-width:600px;margin:0 auto;}
.btn-retry{display:block;width:100%;height:var(--btn-h);background:linear-gradient(135deg,#7c6fff,#a78bfa);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-retry:active{transform:scale(.97);}
</style>
</head>
<body>

<!-- ════ START ════ -->
<div id="s-start" class="screen active">
  <div class="inner">
    <div class="hero">
      <div class="badge">University of Ghana · UGRC150</div>
      <h1>Critical Thinking &amp; Practical Reasoning</h1>
      <p>Past exam questions — test yourself now</p>
      <div class="info-row">
        <div class="info-box"><span class="info-val">25</span><span class="info-lbl">Questions</span></div>
        <div class="info-box"><span class="info-val">MCQ</span><span class="info-lbl">Format</span></div>
        <div class="info-box"><span class="info-val">~15m</span><span class="info-lbl">Est. Time</span></div>
      </div>
      <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>
</div>

<!-- ════ QUIZ ════ -->
<div id="s-quiz" class="screen">
  <div class="topbar">
    <div class="topbar-inner">
      <span class="q-label" id="qlabel">Q 1/25</span>
      <div class="prog-bg"><div class="prog-fill" id="progfill"></div></div>
      <span class="q-label" id="pctlabel" style="color:var(--muted)">0%</span>
    </div>
  </div>
  <div class="score-row">
    <div class="score-chip g"><strong id="sc-c">0</strong>Correct</div>
    <div class="score-chip r"><strong id="sc-w">0</strong>Wrong</div>
    <div class="score-chip"><strong id="sc-s">0%</strong>Score</div>
  </div>
  <div id="qarea"></div>
  <div class="navrow">
    <button class="btn-nav btn-prev" id="btn-prev" onclick="goTo(cur-1)" disabled>← Back</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="advance()">Next →</button>
  </div>
</div>

<!-- ════ RESULTS ════ -->
<div id="s-results" class="screen">
  <div class="res-hero">
    <div class="inner">
      <span class="res-emoji" id="r-emoji">🏆</span>
      <div class="res-title" id="r-title">Outstanding!</div>
      <div class="res-pct" id="r-pct">0%</div>
      <div class="res-sub" id="r-sub">0 of 25 correct</div>
      <div class="res-grid">
        <div class="res-box"><span class="res-val" id="r-c" style="color:var(--green)">0</span><span class="res-lbl">Correct</span></div>
        <div class="res-box"><span class="res-val" id="r-w" style="color:var(--red)">0</span><span class="res-lbl">Wrong</span></div>
        <div class="res-box"><span class="res-val" id="r-p" style="color:var(--accent)">0%</span><span class="res-lbl">Score</span></div>
      </div>
    </div>
  </div>
  <div class="rv-section">
    <div class="rv-title">📋 Answer Review</div>
    <div id="rv-list"></div>
  </div>
  <div class="retry-row">
    <button class="btn-retry" onclick="restart()">🔁 Retake Quiz</button>
  </div>
</div>

<script>
const Q=[
  {q:"Which best describes a factual statement?",o:["Factuals educate by providing insights into concepts.","Factuals objectively describe what exists; value judgments prescribe what should be; definitions give meaning to words.","Factuals prescribe what should be, while value judgments describe what is.","Factuals subjectively describe what should be."],a:1},
  {q:"The expression 'The best academic of all time' exemplifies...",o:["Sentence fragment","Value judgment (moral)","Value judgment (non-moral)","Emotive expression"],a:2},
  {q:"The components of a definition are:",o:["Well-defined and open-textured words","Connotation and denotation","Broad and narrow definitions","Definiendum and definiens"],a:3},
  {q:"Which sense of law has sanctions attached to it?",o:["Logical law","Scientific law","Civil law","Mathematical law"],a:2},
  {q:"'Consciousness is either physical or non-physical. Since it is not physical, it must be non-physical.' Which sense of law is exemplified?",o:["Mathematical law","Moral law","Logical law","Natural law"],a:2},
  {q:"The part of an argument that offers justification for the claim being made is the:",o:["Premise","Induction","Deduction","Conclusion"],a:0},
  {q:"According to the deductive rule...",o:["We can only deny an antecedent or affirm a consequent to reach a valid conclusion.","We can only affirm an antecedent or deny a consequent to reach a valid conclusion.","We can reach a conclusion with a single premise.","We assemble at least two premises to reach a conclusion."],a:1},
  {q:"'Quite a good number of Chinese are involved in illegal mining. So China is out to exploit Africa.' This is an example of...",o:["Misplaced vividness","Grandstanding","Semi-attached figures","Hasty generalization"],a:3},
  {q:"What fallacy is committed in: 'How can you believe his testimony? He is a convicted felon!'",o:["Appeal to anger","Appeal to pity","Post hoc ergo propter hoc","Ad hominem"],a:3},
  {q:"A vitamin supplement was recommended by Dean Karnazes, the world's longest distance runner. This is an example of...",o:["Genetic fallacy","Illegal appeal to authority","Semi-attached figures","Misplaced vividness"],a:1},
  {q:"'Joe Mettle is popular because he is famous and well-known' can be criticized as...",o:["Appeal to emotions","Appeal to authority","Begging the question","Circumvention"],a:2},
  {q:"'Johnson still believes in giving and taking bribes, because that is how he was raised.' This is an example of...",o:["An appeal to pity","Grandstanding","A genetic fallacy","Illegitimate appeal to authority"],a:2},
  {q:"Which type of discourse is: 'We went to the passport office but the workers were on strike, so we went home.'",o:["Instructions","Polemic","Narrative","Argument"],a:2},
  {q:"The numbers 2, 4, 6, 8, 16 represent the ___ of the term 'even'.",o:["Connotation","Denotation","Essentially contestable","Ideal definition"],a:1},
  {q:"What logical error occurs when 'Submission to authority is key in this office' is interpreted as submitting documents?",o:["Equivocation","Ambiguity","Vagueness","Inconsistency"],a:0},
  {q:"Verbal disputes can be resolved by...",o:["Enforcing your perspective","Proffering arguments","Clarifying the language","Resisting oppressors"],a:2},
  {q:"Which of the following is an open-textured term?",o:["All the given options","Fidelity","Religion","Democracy"],a:0},
  {q:"A lexical definition shows how a word is...",o:["Stipulated by the speaker","Theoretically constructed","Commonly used","Demonstrated by pointing"],a:2},
  {q:"In an argument, 'implies that' indicates a/an...",o:["Premise","All the given options","Validity check","Conclusion"],a:3},
  {q:"If you accept premises of a valid deduction as true but deny the conclusion, you create a:",o:["Ambiguity","Equivocation","Vagueness","Contradiction"],a:3},
  {q:"An error in reasoning is described as a/an:",o:["Enthymeme","None of the given options","Syllogism","Fallacy"],a:3},
  {q:"Soundness presupposes validity. True or false?",o:["True","Depends on context","False","Cannot be determined"],a:0},
  {q:"'Happiness is the end of life. The end of life is death. So happiness is death.' Which fallacy?",o:["Circularity","Equivocation","Ad hominem","Appeal to threat"],a:1},
  {q:"'People are really sadistic. Look at the brutality shown by Hitler and Idi Amin.' This is an example of...",o:["Semi-attached figures","Hasty generalization","Unrepresentative sample","Misplaced vividness"],a:3},
  {q:"Which is a logical truth whose truth-value can be known with certainty without observation?",o:["Covid-19 cannot be cured.","The bachelor beat his wife mercilessly.","All the given options are correct.","It is raining at Tema now."],a:1}
];

const L=['A','B','C','D'];
let cur=0,ans=new Array(Q.length).fill(null),crt=0,wrg=0;

function show(id){['s-start','s-quiz','s-results'].forEach(s=>document.getElementById(s).classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function startQuiz(){show('s-quiz');render();}

function render(){
  const q=Q[cur];
  const done=ans[cur]!==null;
  const pct=Math.round(((cur)/(Q.length))*100);
  document.getElementById('qlabel').textContent=`Q ${cur+1}/${Q.length}`;
  document.getElementById('progfill').style.width=pct+'%';
  document.getElementById('pctlabel').textContent=pct+'%';
  document.getElementById('sc-c').textContent=crt;
  document.getElementById('sc-w').textContent=wrg;
  document.getElementById('sc-s').textContent=Math.round((crt/Q.length)*100)+'%';
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').textContent=cur===Q.length-1?'Finish ✓':'Next →';

  let opts=q.o.map((o,i)=>{
    let cls='opt';
    if(done){
      cls+=' dis';
      if(i===q.a) cls+=' show-c';
      if(i===ans[cur]&&ans[cur]!==q.a) cls+=' sel-w';
      if(i===ans[cur]&&ans[cur]===q.a) cls+=' sel-c';
    }
    return `<div class="${cls}" onclick="pick(${i})"><span class="opt-l">${L[i]}</span><span>${o}</span></div>`;
  }).join('');

  let fb='';
  if(done){
    fb=ans[cur]===q.a
      ?`<div class="feedback fb-ok">✅ Correct! Well done.</div>`
      :`<div class="feedback fb-no">❌ Incorrect. Correct answer: <strong>${L[q.a]}. ${q.o[q.a]}</strong></div>`;
  }

  document.getElementById('qarea').innerHTML=`
    <div class="qcard">
      <div class="qnum">Question ${cur+1}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts">${opts}</div>
      ${fb}
    </div>`;
}

function pick(i){
  if(ans[cur]!==null)return;
  ans[cur]=i;
  if(i===Q[cur].a)crt++;else wrg++;
  render();
}

function advance(){
  if(cur===Q.length-1){showResults();return;}
  goTo(cur+1);
}

function goTo(n){
  if(n<0||n>=Q.length)return;
  cur=n;render();window.scrollTo(0,0);
}

function showResults(){
  show('s-results');
  const pct=Math.round((crt/Q.length)*100);
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-sub').textContent=`${crt} of ${Q.length} correct`;
  document.getElementById('r-c').textContent=crt;
  document.getElementById('r-w').textContent=wrg;
  document.getElementById('r-p').textContent=pct+'%';
  let e='💪',t='Keep Practising!';
  if(pct>=80){e='🏆';t='Outstanding!';}
  else if(pct>=60){e='🎯';t='Good Work!';}
  else if(pct>=40){e='📚';t='Keep Studying!';}
  document.getElementById('r-emoji').textContent=e;
  document.getElementById('r-title').textContent=t;

  document.getElementById('rv-list').innerHTML=Q.map((q,i)=>{
    const ok=ans[i]===q.a;
    const myAns=ans[i]!==null?`${L[ans[i]]}. ${q.o[ans[i]]}`:'Not answered';
    const right=`${L[q.a]}. ${q.o[q.a]}`;
    return `<div class="rv-item">
      <div class="rv-dot ${ok?'ok':'no'}"></div>
      <div>
        <div class="rv-q">${i+1}. ${q.q}</div>
        ${ok
          ?`<div class="rv-a"><span class="ok">✔ ${myAns}</span></div>`
          :`<div class="rv-a">Your answer: <span class="no">${myAns}</span><br>Correct: <span class="ok">${right}</span></div>`
        }
      </div>
    </div>`;
  }).join('');
}

function restart(){
  cur=0;ans=new Array(Q.length).fill(null);crt=0;wrg=0;
  show('s-quiz');render();
}
</script>
</body>
</html>
